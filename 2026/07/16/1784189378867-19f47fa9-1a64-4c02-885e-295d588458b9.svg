<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <rect width="700" height="380" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="380" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">AI辅助 vs 传统方式 效率对比</text>
  
  <g transform="translate(60, 55)">
    <!-- Bar 1: 项目谋划 -->
    <text x="0" y="25" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2c3e50">项目谋划</text>
    <!-- Traditional bar -->
    <rect x="120" y="8" width="300" height="18" rx="3" fill="#e0e0e0"/>
    <text x="425" y="23" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">3周</text>
    <!-- AI bar -->
    <rect x="120" y="30" width="75" height="18" rx="3" fill="#1a6bff"/>
    <text x="200" y="45" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#1a6bff">5天 ↓75%</text>
    
    <!-- Bar 2: 政策匹配 -->
    <text x="0" y="75" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2c3e50">政策匹配</text>
    <rect x="120" y="58" width="300" height="18" rx="3" fill="#e0e0e0"/>
    <text x="425" y="73" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">4-8小时</text>
    <rect x="120" y="80" width="15" height="18" rx="3" fill="#1a6bff"/>
    <text x="140" y="95" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#1a6bff">10-15分钟 ↓95%</text>
    
    <!-- Bar 3: 报告生成 -->
    <text x="0" y="125" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2c3e50">报告生成</text>
    <rect x="120" y="108" width="300" height="18" rx="3" fill="#e0e0e0"/>
    <text x="425" y="123" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">3-5天</text>
    <rect x="120" y="130" width="30" height="18" rx="3" fill="#ff6b35"/>
    <text x="155" y="145" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#ff6b35">1小时 ↓90%</text>
    
    <!-- Bar 4: 投资测算 -->
    <text x="0" y="175" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2c3e50">投资测算</text>
    <rect x="120" y="158" width="300" height="18" rx="3" fill="#e0e0e0"/>
    <text x="425" y="173" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">1-2天</text>
    <rect x="120" y="180" width="20" height="18" rx="3" fill="#2e7d32"/>
    <text x="145" y="195" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">30分钟 ↓85%</text>
    
    <!-- Bar 5: 风险识别 -->
    <text x="0" y="225" font-family="'Microsoft YaHei',sans-serif" font-size="12" fill="#2c3e50">风险识别</text>
    <rect x="120" y="208" width="300" height="18" rx="3" fill="#e0e0e0"/>
    <text x="425" y="223" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#888">事后发现</text>
    <rect x="120" y="230" width="250" height="18" rx="3" fill="#e53935" opacity="0.8"/>
    <text x="245" y="245" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#fff">提前2-4周预警 质的提升</text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(250, 310)">
    <rect x="0" y="0" width="16" height="12" rx="2" fill="#e0e0e0"/>
    <text x="20" y="11" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#666">传统方式</text>
    <rect x="100" y="0" width="16" height="12" rx="2" fill="#1a6bff"/>
    <text x="120" y="11" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#666">AI辅助方式</text>
  </g>
  
  <text x="690" y="372" text-anchor="end" font-family="sans-serif" font-size="9" fill="#aaa">数据来源：墨工AI产品内测数据</text>
</svg>
