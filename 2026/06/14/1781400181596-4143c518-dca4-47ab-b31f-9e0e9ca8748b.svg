<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">买电脑时看升级空间</title>
  <desc id="desc">买电脑时要确认内存是否焊死，能否后期升级到更大容量</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <text x="70" y="84" fill="#111827" font-size="42" font-weight="700">买之前先问：以后还能不能加内存？</text>
    <text x="72" y="130" fill="#475569" font-size="24">不能升级的轻薄本，初始容量更要想清楚</text>
    <g transform="translate(120 220)">
      <rect width="430" height="310" rx="24" fill="#ffffff" stroke="#d1d5db"/>
      <text x="42" y="62" fill="#111827" font-size="30" font-weight="700">内存焊死</text>
      <rect x="75" y="110" width="280" height="120" rx="20" fill="#e5e7eb"/>
      <rect x="112" y="145" width="84" height="50" rx="10" fill="#94a3b8"/>
      <rect x="225" y="145" width="84" height="50" rx="10" fill="#94a3b8"/>
      <text x="42" y="280" fill="#991b1b" font-size="23">买来是多少，以后基本就是多少</text>
    </g>
    <g transform="translate(650 220)">
      <rect width="430" height="310" rx="24" fill="#ffffff" stroke="#d1d5db"/>
      <text x="42" y="62" fill="#111827" font-size="30" font-weight="700">可后期升级</text>
      <rect x="70" y="120" width="130" height="80" rx="16" fill="#dcfce7"/>
      <rect x="230" y="120" width="130" height="80" rx="16" fill="#99f6e4"/>
      <path d="M203 160 H227" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/>
      <path d="M227 160 L214 147 M227 160 L214 173" stroke="#0f766e" stroke-width="8" stroke-linecap="round"/>
      <text x="101" y="168" fill="#166534" font-size="24" font-weight="700">16GB</text>
      <text x="261" y="168" fill="#115e59" font-size="24" font-weight="700">32GB</text>
      <text x="42" y="280" fill="#115e59" font-size="23">先买够用，以后不够再加</text>
    </g>
  </g>
</svg>
